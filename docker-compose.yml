services:
  redis:
    image: redis:7-alpine
    container_name: carevoice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # =============================================================================
  # BACKEND LAYER
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: >
      sh -c "/app/.venv/bin/python -m scripts.seed_data &&
             /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # BACKGROUND WORKERS
  # =============================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - ./backend/app:/app/app
    command: >
      /app/.venv/bin/watchfiles
      "/app/.venv/bin/celery -A app.tasks.celery_app worker --loglevel=info --queues=notifications,billing,slots --concurrency=4"
      /app/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - ./backend/app:/app/app
    command: >
      /app/.venv/bin/watchfiles
      "/app/.venv/bin/celery -A app.tasks.celery_app beat --loglevel=info --scheduler=celery.beat:PersistentScheduler"
      /app/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # FRONTEND
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: carevoice-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # =============================================================================
  # MONITORING
  # =============================================================================
volumes:
  redis_data:
