services:
  db:
    image: postgres:15-alpine
    container_name: carevoice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dfisvgbvslhikbvsab
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carevoice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # =============================================================================
  # BACKEND LAYER
  # =============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+asyncpg://postgres:dfisvgbvslhikbvsab@db:5432/postgres
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: >
      sh -c "/app/.venv/bin/python -m scripts.seed_data &&
             /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # BACKGROUND WORKERS
  # =============================================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+asyncpg://postgres:dfisvgbvslhikbvsab@db:5432/postgres
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: >
      /app/.venv/bin/celery -A app.tasks.celery_app worker
      --loglevel=info
      --queues=notifications,billing,slots
      --concurrency=4
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevoice-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+asyncpg://postgres:dfisvgbvslhikbvsab@db:5432/postgres
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: >
      /app/.venv/bin/celery -A app.tasks.celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================================================================
  # FRONTEND
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carevoice-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend

  # =============================================================================
  # MONITORING
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: carevoice-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: carevoice-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: carevoice_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:
