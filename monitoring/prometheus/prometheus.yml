global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "carevoice-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "carevoice-api"
          environment: "development"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
